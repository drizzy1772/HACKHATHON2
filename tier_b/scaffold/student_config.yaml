# =============================================================================
# Tier-B — КОНФІГ ВАШОЇ КОМАНДИ. Скопійовано з config.yaml; усі значення `null`
# позначені TODO — це гіперпараметри PPO/SAC, які ви обираєте й обґрунтовуєте.
# Решту секцій (sim/reward/curriculum/...) НЕ чіпайте — вони звіряються тестом.
# Тренування:  conda run -n drones python tier_b/train_ppo.py --config tier_b/scaffold/student_config.yaml
# =============================================================================


sim:
  drone_model: cf2x
  physics: pyb            # Physics.PYB — сили на лінках + явний z-torque
  pyb_freq: 240           # частота фізики, Гц
  ctrl_freq: 48           # частота політики, Гц. ЧЕСНЕ ВІДХИЛЕННЯ від "50 Гц" у ТЗ:
                          # 240/50 не ціле; 48 = 240/5 — найближче допустиме.
  episode_max_s: 12.0     # 576 кроків політики
  g: 9.8                  # як у gym-pybullet-drones (BaseAviary.G)

action:                   # CTBR: a = [c, wx, wy, wz], усе з Box(-1,1,(4,))
  c_max_g: 2.0            # колективна тяга до 2·g (mass-normalized) — фізична
                          # передумова knife-edge, виміряна у Tier-A+ (T=mg/cos φ)
  rate_limits: [6.0, 6.0, 3.0]   # ліміти body-rate setpoint, рад/с
  tau_c: 0.05             # стала часу P-контролера швидкостей: K = J / tau_c
  history_len: 4          # N останніх дій в observation

body:                     # еліпсоїд корпусу для аналітичної колізії (рішення користувача)
  semi_axes: [0.12, 0.12, 0.04]   # a, b (горизонтальні), c (вертикальна), м

lidar:
  n_rays: 34              # 8 XOY + 6 YOZ + 4 XOZ + 16 (4 промені × 4 бісектрисні кола)
  max_range: 4.0          # м; hitFraction=1.0 → немає перешкоди

forest:
  gate_x: [3.0, 6.0, 9.0] # позиції воріт уздовж +x
  gate_jitter_y: 0.8      # рівномірний зсув центру воріт по y, ±м
  tree_radius: 0.20       # м — реальний саплінг; великий відносно CF2X (span 0.12)
  tree_height: 4.0
  n_distractors: [6, 10]  # рівномірно ціле з [min, max]
  distractor_x: [1.5, 10.5]
  distractor_y: [-3.0, 3.0]
  corridor_clearance: 1.2 # дистрактори не ближче до полілінії маршруту, м
  tree_min_sep: 0.5       # мінімальна відстань між стовбурами дистракторів
  cruise_z: 1.0           # робоча висота, м
  start: [0.0, 0.0]
  finish: [12.0, 0.0]

curriculum:               # w(φ)=sqrt((0.12cosφ)²+(0.04sinφ)²), запас 1 см
  # ВИМІРЯНА КОРЕКЦІЯ №3 (probe2 300k): старт із 0.40 м вимагає ±8 см точності
  # від ненавченого пілота — політика літає, але 0 воріт за 1655 епізодів
  # (12% колізій біля воріт, 30% stall). Драбина тепер починається з
  # справді прохідних воріт; хвіст (крен → knife-edge) незмінний.
  gaps: [1.20, 0.80, 0.55, 0.40, 0.30, 0.26, 0.20, 0.16, 0.12]  # L0..L8
  advance_window: 200     # епізодів у вікні
  advance_rate: 0.7       # success_rate для переходу на рівень вище

reward:                   # усі члени; аналіз reward-hacking — у README
  gamma: 0.99             # γ алгоритму (PPO/SAC)
  # ВИМІРЯНА КОРЕКЦІЯ №2 (probe 300k): shaping у формі γΦ′−Φ з γ=0.99 платить
  # −(1−γ)Φ = +0.58/крок «ренти» за стояння далеко від цілі → політика
  # зависала на 532 кроки, 0 воріт. Форма Φ′−Φ (γ=1, телескопічна — саме її
  # перевіряє loop-sum-zero тест) дає рівно 0 за стояння; Φ(terminal)=0 лишається.
  shaping_gamma: 1.0
  k_prog: 5.0             # potential-based уздовж траєкторії, Φ(terminal)=0
  k_gate: 2.0             # potential-based до центру наступних воріт
  # ВИМІРЯНА КОРЕКЦІЯ (smoke 50k): при base −50 агент НАВЧИВСЯ розбиватись —
  # Φ(terminal)=0 «конфіскує» потенціал, тож ковзна колізія далеко від цілі
  # обналічувала до +70 shaping за −50 штрафу. base −100 (лобовий −200)
  # робить будь-яку колізію гіршою за зависання. Це і є інваріант 4 у дії.
  collision_base: -100.0  # термінальний штраф за колізію...
  collision_depth_scale: -100.0  # ...+ масштаб глибиною: base + scale·min(1, depth/depth_ref)
  collision_depth_ref: 0.04      # = вертикальна напіввісь еліпсоїда
  z_min: 0.15             # підлога по висоті
  k_alt: 10.0             # штраф −k_alt·max(0, z_min − z)
  k_omega: 0.01           # −k_omega·‖ω‖² проти тріпотіння
  step_cost: -0.02        # анти-зависання
  gate_bonus: 25.0        # за кожен пройдений прохід (крізь щілину, не в обхід)
  finish_bonus: 100.0     # термінал успіху

jam:                      # критерій застрягання (рішення користувача)
  v_thresh: 0.05          # м/с
  window_s: 2.0           # безперервно; 96 кроків при 48 Гц
  finish_zone: 0.5        # у радіусі фінішу jam не рахуємо
  # ВИМІРЯНЕ ДОПОВНЕННЯ (probe 300k): «кружляння на місці» зі швидкістю
  # >0.05 м/с velocity-jam не ловить — додатково обриваємо, якщо залишкова
  # довжина маршруту не покращилась на ≥progress_eps за progress_window_s
  progress_eps: 0.1       # м
  progress_window_s: 5.0  # с (240 кроків при 48 Гц)

waypoints:
  pass_radius: 0.25       # вейпоінт зараховано в радіусі, або при перетині площини воріт

bounds:                   # вихід за межі світу → truncated
  x: [-2.0, 14.0]
  y: [-4.0, 4.0]
  z: [0.02, 3.0]

ppo:
  n_envs: 8
  n_steps: 1024           # кроків/env за rollout: 8·1024=8192 переходів (~1.8 епізоди×8 env)
  batch_size: 512         # ділить 8192 націло → 16 мінібатчів на епоху
  learning_rate: 0.0003   # типовий для PPO на неперервному контролі
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0           # неперервний PPO: ентропію тримає log_std, окремий бонус не потрібен
  # виміряно на smoke: std=1 на 4 CTBR-каналах → перекиди і ~60% епізодів
  # закінчуються out-of-bounds за ~1.6 с; старт розвідки біля зависання
  # (std≈0.37) лишає тягу коло g і швидкості в межах ±2 рад/с
  log_std_init: -1.0      # exp(-1.0)=0.37 — саме той виміряний безпечний старт розвідки
  net_arch: [256, 256]    # 2×256 MLP — стандарт для CTBR-контролю
  device: cpu             # виміряно (RunSky): для малих MLP на Apple Silicon CPU швидший за MPS
  total_steps: 2000000    # стеля бюджету треку (2M кроків)
  checkpoint_every: 100000

sac:
  n_envs: 4               # SAC обмежений градієнтами, не збором; 4 env + gradient_steps=-1
  buffer_size: 1000000    # зберігає канонічне співвідношення 1 update : 1 transition
  batch_size: 256         # стандарт SAC для неперервного контролю
  learning_rate: 0.0003   # типовий SAC
  tau: 0.005              # м'яке оновлення target-мереж (стандарт SAC)
  learning_starts: 10000  # наповнити буфер випадковими діями перед стартом навчання
  train_freq: 1
  gradient_steps: -1
  net_arch: [256, 256]    # 2×256 MLP
  device: cpu
  total_steps: 2000000    # стеля бюджету треку (2M кроків)
  checkpoint_every: 100000

eval:
  n_episodes: 100
  master_seed_offset: 900000   # held-out сіди: ніколи не перетинаються з тренувальними
